x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-zammad-prod-env: &zammad-prod-env
  POSTGRESQL_HOST: zammad-prod-postgresql
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_DB: zammad
  POSTGRESQL_USER: zammad
  POSTGRESQL_PASS: Prod06Password!
  REDIS_URL: redis://:Prod06Redis!@zammad-prod-redis:6379
  ELASTICSEARCH_HOST: zammad-prod-elasticsearch
  ELASTICSEARCH_PORT: "9200"
  ELASTICSEARCH_SCHEMA: http
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  ZAMMAD_FQDN: zammad.lab.local

services:
  zammad-prod-ldap:
    image: osixia/openldap:1.5.0
    container_name: zammad-prod-ldap
    restart: always
    environment:
      LDAP_ORGANISATION: "IT-Stack Production"
      LDAP_DOMAIN: lab.local
      LDAP_ADMIN_PASSWORD: LdapProd06!
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ReadOnlyProd06!
    ports:
      - "3898:389"
    volumes:
      - zammad-prod-ldap-data:/var/lib/ldap
      - zammad-prod-ldap-config:/etc/ldap/slapd.d
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=lab,dc=local -D cn=admin,dc=lab,dc=local -w LdapProd06! > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  zammad-prod-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: zammad-prod-keycloak
    restart: always
    command: start-dev
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Prod06Admin!
    ports:
      - "8210:8080"
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  zammad-prod-postgresql:
    image: postgres:15-alpine
    container_name: zammad-prod-postgresql
    restart: always
    environment:
      POSTGRES_DB: zammad
      POSTGRES_USER: zammad
      POSTGRES_PASSWORD: Prod06Password!
    volumes:
      - zammad-prod-postgresql-data:/var/lib/postgresql/data
    networks:
      - zammad-prod-db-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zammad"]
      interval: 10s
      timeout: 5s
      retries: 5

  zammad-prod-elasticsearch:
    image: elasticsearch:8.13.4
    container_name: zammad-prod-elasticsearch
    restart: always
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
    volumes:
      - zammad-prod-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  zammad-prod-redis:
    image: redis:7-alpine
    container_name: zammad-prod-redis
    restart: always
    command: >
      redis-server
      --requirepass Prod06Redis!
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - zammad-prod-redis-data:/data
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Prod06Redis!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zammad-prod-smtp:
    image: mailhog/mailhog:latest
    container_name: zammad-prod-smtp
    restart: always
    ports:
      - "8028:8025"
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging: *default-logging

  zammad-prod-init:
    image: ghcr.io/zammad/zammad:6.3.1-39
    container_name: zammad-prod-init
    restart: on-failure
    command: ["zammad-init"]
    depends_on:
      zammad-prod-postgresql:
        condition: service_healthy
      zammad-prod-elasticsearch:
        condition: service_healthy
    environment:
      <<: *zammad-prod-env
    volumes:
      - zammad-prod-data:/opt/zammad/storage
    networks:
      - zammad-prod-net
      - zammad-prod-db-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging: *default-logging

  zammad-prod-railsserver:
    image: ghcr.io/zammad/zammad:6.3.1-39
    container_name: zammad-prod-railsserver
    restart: always
    command: ["zammad-railsserver"]
    depends_on:
      zammad-prod-init:
        condition: service_completed_successfully
      zammad-prod-redis:
        condition: service_healthy
    environment:
      <<: *zammad-prod-env
    volumes:
      - zammad-prod-data:/opt/zammad/storage
    networks:
      - zammad-prod-net
      - zammad-prod-db-net
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/users/me | grep -q 'error\\|id' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  zammad-prod-scheduler:
    image: ghcr.io/zammad/zammad:6.3.1-39
    container_name: zammad-prod-scheduler
    restart: always
    command: ["zammad-scheduler"]
    depends_on:
      zammad-prod-railsserver:
        condition: service_healthy
    environment:
      <<: *zammad-prod-env
    volumes:
      - zammad-prod-data:/opt/zammad/storage
    networks:
      - zammad-prod-net
      - zammad-prod-db-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"
    logging: *default-logging

  zammad-prod-websocket:
    image: ghcr.io/zammad/zammad:6.3.1-39
    container_name: zammad-prod-websocket
    restart: always
    command: ["zammad-websocket"]
    depends_on:
      zammad-prod-railsserver:
        condition: service_healthy
    environment:
      <<: *zammad-prod-env
    networks:
      - zammad-prod-net
      - zammad-prod-db-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging: *default-logging

  zammad-prod-nginx:
    image: nginx:1.25-alpine
    container_name: zammad-prod-nginx
    restart: always
    depends_on:
      zammad-prod-railsserver:
        condition: service_healthy
    ports:
      - "3002:80"
    volumes:
      - zammad-prod-nginx:/etc/nginx/conf.d:ro
    networks:
      - zammad-prod-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  zammad-prod-ldap-data:
  zammad-prod-ldap-config:
  zammad-prod-postgresql-data:
  zammad-prod-elasticsearch-data:
  zammad-prod-redis-data:
  zammad-prod-data:
  zammad-prod-nginx:

networks:
  zammad-prod-net:
  zammad-prod-db-net:
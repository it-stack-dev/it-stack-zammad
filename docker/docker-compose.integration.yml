# docker-compose.integration.yml -- Lab 05: Advanced Integration
# Zammad + OpenLDAP (FreeIPA sim) + PostgreSQL + Elasticsearch + Redis + Keycloak + SMTP + WireMock
# Lab 05 tests: LDAP user import, OIDC SSO, ES full-text search, email ticket creation, FreePBX CTI
#
# Ports:
#   3001 -- Zammad (nginx)
#   8110 -- Keycloak admin console
#   3893 -- OpenLDAP
#   8027 -- WireMock (FreePBX mock)
#
# Credentials:
#   LDAP admin:    cn=admin,dc=lab,dc=local / LdapAdmin05!
#   LDAP readonly: cn=readonly,dc=lab,dc=local / ReadOnly05!
#   DB:            zammad / Lab05Password!
#   Redis:         Lab05Redis!
#   Keycloak:      admin / Lab05Admin!
#   OIDC secret:   zammad-secret-05
# INT-06 additions:
#   + zammad-int-ldap-seed: init container — loads FreeIPA-style LDIF (zammadadmin/zammaduser1/zammaduser2)
#   + Keycloak depends on seed completion for LDAP federation to find pre-seeded users
#   + LDAP_BASE_DN set to cn=users,cn=accounts,dc=lab,dc=local (FreeIPA tree)
#   + Zammad env: KEYCLOAK_URL, KEYCLOAK_REALM, KEYCLOAK_CLIENT_ID
# INT-10 additions:
#   + zammad-int-mock: WireMock 3.x simulates FreePBX REST API (/api/rest.php, /admin/config.php)
#   + Zammad env: FREEPBX_URL, FREEPBX_AMI_HOST, FREEPBX_AMI_PORT, FREEPBX_AMI_USER, FREEPBX_AMI_PASSWORD
#   + Integration tested: Zammad ↔ FreePBX CTI (phone ticket creation via cti_generic_api channel)

x-zammad-int-env: &zammad-int-env
  POSTGRESQL_HOST: zammad-int-postgresql
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_DB: zammad
  POSTGRESQL_USER: zammad
  POSTGRESQL_PASS: Lab05Password!
  ELASTICSEARCH_HOST: zammad-int-elasticsearch
  ELASTICSEARCH_PORT: "9200"
  REDIS_URL: redis://:Lab05Redis!@zammad-int-redis:6379
  RAILS_MAX_THREADS: "5"
  WEB_CONCURRENCY: "2"
  # Keycloak OIDC (INT-06)
  KEYCLOAK_URL: http://zammad-int-keycloak:8080
  KEYCLOAK_REALM: it-stack
  KEYCLOAK_CLIENT_ID: zammad
  # FreePBX CTI integration (via WireMock — INT-10)
  FREEPBX_URL: http://zammad-int-mock:8080
  FREEPBX_AMI_HOST: zammad-int-mock
  FREEPBX_AMI_PORT: "5038"
  FREEPBX_AMI_USER: admin
  FREEPBX_AMI_PASSWORD: Admin05!

services:
  zammad-int-ldap:
    image: osixia/openldap:1.5.0
    container_name: zammad-int-ldap
    environment:
      LDAP_ORGANISATION: "IT-Stack Lab"
      LDAP_DOMAIN: lab.local
      LDAP_ADMIN_PASSWORD: LdapAdmin05!
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ReadOnly05!
    ports:
      - "3893:389"
    networks:
      - zammad-int-app-net
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=lab,dc=local -D cn=admin,dc=lab,dc=local -w LdapAdmin05! > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── LDAP seed (INT-06) ───────────────────────────────────────────────────
  zammad-int-ldap-seed:
    image: osixia/openldap:1.5.0
    container_name: zammad-int-ldap-seed
    restart: no
    entrypoint: >
      /bin/bash -c
      "sleep 8 &&
      ldapadd -x -H ldap://zammad-int-ldap:389
        -D 'cn=admin,dc=lab,dc=local'
        -w LdapAdmin05!
        -f /ldif/zammad-ldap-seed.ldif &&
      echo 'SEED_COMPLETE'"
    volumes:
      - ./zammad-ldap-seed.ldif:/ldif/zammad-ldap-seed.ldif:ro
    depends_on:
      zammad-int-ldap:
        condition: service_healthy
    networks:
      - zammad-int-app-net

  zammad-int-postgresql:
    image: postgres:15-alpine
    container_name: zammad-int-postgresql
    environment:
      POSTGRES_DB: zammad
      POSTGRES_USER: zammad
      POSTGRES_PASSWORD: Lab05Password!
    volumes:
      - zammad-int-pg-data:/var/lib/postgresql/data
    networks:
      - zammad-int-data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zammad"]
      interval: 10s
      timeout: 5s
      retries: 5

  zammad-int-elasticsearch:
    image: elasticsearch:8.11.1
    container_name: zammad-int-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - zammad-int-es-data:/usr/share/elasticsearch/data
    networks:
      - zammad-int-data-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  zammad-int-redis:
    image: redis:7-alpine
    container_name: zammad-int-redis
    command: redis-server --requirepass Lab05Redis!
    networks:
      - zammad-int-data-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Lab05Redis!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zammad-int-keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: zammad-int-keycloak
    command: start-dev
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Lab05Admin!
    ports:
      - "8110:8080"
    depends_on:
      zammad-int-ldap-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - zammad-int-app-net

  zammad-int-smtp:
    image: mailhog/mailhog:latest
    container_name: zammad-int-smtp
    ports:
      - "8026:8025"
    networks:
      - zammad-int-mail-net

  # ── WireMock (FreePBX mock — INT-10) ─────────────────────────────
  zammad-int-mock:
    image: wiremock/wiremock:3.5.2
    container_name: zammad-int-mock
    command: ["--port", "8080", "--global-response-templating", "--verbose"]
    ports:
      - "8027:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zammad-int-app-net

  zammad-int-init:
    image: ghcr.io/zammad/zammad:latest
    container_name: zammad-int-init
    command: ["zammad", "init"]
    depends_on:
      zammad-int-postgresql:
        condition: service_healthy
      zammad-int-elasticsearch:
        condition: service_healthy
      zammad-int-redis:
        condition: service_healthy
    environment:
      <<: *zammad-int-env
    networks:
      - zammad-int-app-net
      - zammad-int-data-net

  zammad-int-railsserver:
    image: ghcr.io/zammad/zammad:latest
    container_name: zammad-int-railsserver
    command: ["zammad", "run", "rails-server"]
    depends_on:
      - zammad-int-init
    environment:
      <<: *zammad-int-env
    networks:
      - zammad-int-app-net
      - zammad-int-data-net
      - zammad-int-mail-net

  zammad-int-scheduler:
    image: ghcr.io/zammad/zammad:latest
    container_name: zammad-int-scheduler
    command: ["zammad", "run", "scheduler"]
    depends_on:
      - zammad-int-init
    environment:
      <<: *zammad-int-env
    networks:
      - zammad-int-app-net
      - zammad-int-data-net

  zammad-int-websocket:
    image: ghcr.io/zammad/zammad:latest
    container_name: zammad-int-websocket
    command: ["zammad", "run", "websocket-server"]
    depends_on:
      - zammad-int-init
    environment:
      <<: *zammad-int-env
    networks:
      - zammad-int-app-net
      - zammad-int-data-net

  zammad-int-nginx:
    image: ghcr.io/zammad/zammad:latest
    container_name: zammad-int-nginx
    command: ["zammad", "run", "nginx"]
    depends_on:
      - zammad-int-railsserver
      - zammad-int-websocket
    environment:
      <<: *zammad-int-env
    ports:
      - "3001:8080"
    networks:
      - zammad-int-app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  zammad-int-pg-data:
  zammad-int-es-data:

networks:
  zammad-int-app-net:
  zammad-int-data-net:
  zammad-int-mail-net: